class_based:
  algorithms:
    single_channel:
      docstring: 'Data manipulation steps for standard "single_channel" algorithm.

        Generalized algorithm to apply data manipulation steps in a standard order
        to apply corrections to a single channel output product.'
      family: list_numpy_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/single_channel.py
      signature: (arrays, output_data_range=None, input_units=None, output_units=None,
        min_outbounds='crop', max_outbounds='crop', norm=False, inverse=False, sun_zen_correction=False,
        mask_night=False, max_day_zen=None, mask_day=False, min_night_zen=None, gamma_list=None,
        scale_factor=None, satellite_zenith_angle_cutoff=None)
  colormappers:
    IR_BD:
      docstring: Module containing user-specified IR-BD algorithm colormap.
      family: matplotlib
      interface: colormappers
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/colormappers/visir/IR_BD.py
      signature: (data_range=[-90.0, 40.0])
  coverage_checkers:
    center_radius:
      docstring: Coverage check routine for center radius coverage checks.
      family: standard
      interface: coverage_checkers
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/coverage_checkers/center_radius.py
      signature: (xarray_obj, variable_name, area_def=None, radius_km=300)
  filename_formatters:
    basic_fname:
      docstring: Filename specification using minimal basic attributes, and no subdirs.
      family: xarray_area_product_to_filename
      interface: filename_formatters
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/filename_formatters/basic_fname.py
      signature: (xarray_obj, area_def, product_name, output_type='.png', basedir='/home/evan/geoips/geoips_packages/outdirs/preprocessed/annotated_imagery',
        extra_field=None)
  interpolators:
    interp_nearest:
      docstring: Geoips plugin for driving pyresample Nearest Neighbor interpolation.
      family: 2d
      interface: interpolators
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/interpolators/pyresample_wrappers/interp_nearest.py
      signature: (area_def, input_xarray, output_xarray, varlist, array_num=None,
        **kwargs)
  output_checkers:
    image:
      docstring: Test script for representative product comparisons.
      family: standard
      interface: output_checkers
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/output_checkers/image.py
      signature: (plugin, compare_path, output_products, threshold=0.05)
  output_formatters:
    imagery_annotated:
      docstring: Matplot-lib based annotated image output.
      family: image_overlay
      interface: output_formatters
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/output_formatters/imagery_annotated.py
      signature: (area_def, xarray_obj, product_name, output_fnames, clean_fname=None,
        product_name_title=None, mpl_colors_info=None, feature_annotator=None, gridline_annotator=None,
        product_datatype_title=None, bg_data=None, bg_mpl_colors_info=None, bg_xarray=None,
        bg_product_name_title=None, bg_datatype_title=None, remove_duplicate_minrange=None,
        title_copyright=None, title_formatter=None, output_dict=None, var_name=None,
        x_size=None, y_size=None)
  procflows:
    single_source:
      docstring: Processing workflow for single data source processing.
      family: standard
      interface: procflows
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/procflows/single_source.py
      signature: (fnames, command_line_args=None)
  readers:
    abi_netcdf:
      docstring: Standard GeoIPS xarray dictionary based ABI NetCDF data reader.
      family: standard
      interface: readers
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/readers/abi_netcdf.py
      signature: (fnames, metadata_only=False, chans=None, area_def=None, self_register=False,
        geolocation_cache_backend='memmap', cache_chunk_size=None, cache_data=False,
        cache_solar_angles=False, geolocation_only=False, resource_tracker=None, roi=None,
        cache_timeout_seconds=30, satellite_zenith_angle_cutoff=75)
      source_names:
      - abi
  sector_metadata_generators:
    volc_parser:
      docstring: Parser for dyanmic volcanoes csv files.
      family: volc
      interface: sector_metadata_generators
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/sector_metadata_generators/volc_parser.py
      signature: (trackfile_name)
  sector_spec_generators:
    center_coordinates:
      docstring: 'Generate standard pyresample area definitions given center coordinates.

        Given desired center lat/lon, projection, resolution, and shape, return a
        valid pyresample area definition object.'
      family: area_definition
      interface: sector_spec_generators
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/sector_spec_generators/center_coordinates.py
      signature: (area_id, long_description, clat, clon, projection, pixel_width,
        pixel_height, num_samples, num_lines)
  title_formatters:
    static_standard:
      docstring: Standard GeoIPS static title production.
      family: standard
      interface: title_formatters
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/title_formatters/static_standard.py
      signature: (area_def, xarray_obj, product_name_title, product_datatype_title=None,
        bg_xarray=None, bg_product_name_title=None, bg_datatype_title=None, title_copyright=None)
text_based:
  ascii_palettes:
    tpw_cimss:
      package: geoips
      relpath: plugins/txt/ascii_palettes/tpw_cimss.txt
    tpw_purple:
      package: geoips
      relpath: plugins/txt/ascii_palettes/tpw_purple.txt
    tpw_pwat:
      package: geoips
      relpath: plugins/txt/ascii_palettes/tpw_pwat.txt
yaml_based:
  feature_annotators:
    default:
      docstring: 'The default feature_annotators plugin.

        All line types enabled. All colored red. 2px coastlines, 1px countries, 0.5px
        states borders, and 0px rivers.'
      family: cartopy
      interface: feature_annotators
      package: geoips
      plugin_type: yaml_based
      relpath: plugins/yaml/feature_annotators/default.yaml
  gridline_annotators:
    default:
      docstring: 'The default gridline_annotators plugin.

        Top and left gridline labels, latitude and longitude lines colored black,
        auto spacing, 1px linewidth, and [4, 2] linestyle'
      family: cartopy
      interface: gridline_annotators
      package: geoips
      plugin_type: yaml_based
      relpath: plugins/yaml/gridline_annotators/default.yaml
  product_defaults:
    Infrared:
      docstring: The Infrared product_defaults configuration.
      family: interpolator_algorithm_colormapper
      interface: product_defaults
      package: geoips
      plugin_type: yaml_based
      relpath: plugins/yaml/product_defaults/visir/Infrared.yaml
  products:
    abi:
      Infrared:
        docstring: "11.2 \xB5m Infrared.  This product utilizes channel 14 (11.2 \xB5\
          m) and highlights areas of deep convection within a Tropical Cyclone."
        family: null
        interface: products
        package: geoips
        plugin_type: yaml_based
        product_defaults: Infrared
        relpath: plugins/yaml/products/abi.yaml
        source_names:
        - abi
  sectors:
    Guam:
      docstring: Guam
      family: area_definition_static
      interface: sectors
      package: geoips
      plugin_type: yaml_based
      relpath: plugins/yaml/sectors/static/guam.yaml
  workflows:
    abi_infrared:
      docstring: ABI Infrared Workflow.
      family: order_based
      interface: workflows
      package: geoips
      plugin_type: yaml_based
      relpath: plugins/yaml/workflows/abi.yaml
