        \ channel information: Chan  AMSU-B  Frequency       AMSU-B         Bandwidth\
        \  Sensitivity  Polarization Num   Chan#  (GHz)            Freq(GHz)     \
        \ (MHz)      NEDT (K)     (at nadir) 1     16      89.0            89.0 \xB1\
        \ 0.9     2800       0.22         Vertical 2     17      157.0           150\
        \ \xB1 0.9      2800       0.34         Vertical 3     18      183.311 \xB1\
        \ 1.00  183.31 \xB1 1.00  2 x 500    0.51         Horizontal 4     19    \
