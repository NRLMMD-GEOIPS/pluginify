    ssmi_binary:
      docstring: 'SSMI binary reader.

        This SSMI reader is desgined for importing SSMI sdr data files (such as ssmi_orbital_sdrmi_f15_d20200427_s104500_e123100_r05323_cfnoc.def).
        This reader is created to read in TBs at 19 (V,H),22V, 37(V,H) and 85 (V,H)
        GHz channels.

        There are A/B scans for 85 GHz.  The combined A/B scans will be used for TC
        imagery products at 85 GHz.

        This GEOIPS python code is based on a SSMI SDR reader in C.

        Convert SSMI_HIRES_AB for 85GHz and SSMI_LORES for 19-37GHz into xarray for
        GEOIPS framework V1.0:  Initial version, NRL-MRY, May 19, 2020 SSMI input
        data info::     pixels per scan:     LORES=64 for 19, 22, and 37 GHz channels;     HIRES=128
        for 85 GHz channels         19V[LORES]                                    FOV:   69km
        x 43km         19H[LORES]         22V[LORES]                                           50km
        x 40km         37V[LORES]                                           37km x
        28km         37H[LORES]         85V[HIRES][2]    [][0]: A scans; [][1]: B
        scans      15km x 13km         85H[HIRES][2]            -----header info-----     int32         cyr,
        cmon, cday,       /* file creation date */         chr, cmin,             /*
        file creation time */         scans,                 /* number of scans in
        file (from DataSeq) */         scid,                  /* spacecraft ID */         rev,                   /*
        nominal rev  */         bjld, bhr, bmin, bsec, /* begin day of year (julian
        day), time=hr,min,sec */         ejld, ehr, emin, esec, /* ending day of year,
        time */         ajld, ahr, amin, asec, /* ascending node DOY, time */         lsat;                  /*
        logical satellite ID */        -----scan data-----     int32 scann;                 /*
        scan number (from ScanHdr1) */     int32 bst;                   /* B-scan
        start time (sec) scaled by 10000 */     double xtime;                /* bst
        as seconds since 0z 1 Jan 1987 */     uint16         v19[LORES],              /*
        TBs */         h19[LORES],         v22[LORES],         v37[LORES],         h37[LORES],         v85[HIRES][2],         h85[HIRES][2],         lon[HIRES][2];           /*
        longitudes */     int16 lat[HIRES][2];         /* latitudes */     char sft[HIRES][2];          /*
        surface types */'
      family: standard
      interface: readers
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/readers/ssmi_binary.py
      signature: (fnames, metadata_only=False, chans=None, area_def=None, self_register=False)
      source_names:
      - ssmi
    ssmis_binary:
