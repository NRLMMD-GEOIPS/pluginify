    atms_hdf5:
      docstring: "Reader to read a grannual NOAA ATMS SDR TBs in h5 format.\nOutput\
        \ variables in xarray object for geoips processing system V0:   August 25,\
        \ 2021 The date is generated by the NOAA community satellite processing package\
        \ (CSPP), developed at CIMSS Example of ATMS file names::     'SATMS_j01_d20210809_t0959306_e1000023_b19296_fnmoc_ops.h5'\
        \         SDR TBs variables     'GATMO_j01_d20210809_t0959306_e1000023_b19296_fnmoc_ops.h5'\
        \         SDR Geolocation variables Dataset info::     TB[12,96,22]:  for\
        \ each granuel     CHAN#  Center-Freq(GHz)  POL     1      23.8          \
        \     V     2      31.4               V     3      50.3               H  \
        \   4      51.76              H     5      52.8               H     6    \
        \  53.596+-0.115      H     7      54.4               H     8      54.94 \
        \             H     9      55.5               H     10     57.290(f0)    \
        \     H     11     f0 +-0.217         H     12     f0 +-0.322+-0.048  H  \
        \   13     f0 +-0.322+-0.022  H     14     f0 +-0.322+-0.010  H     15   \
        \  f0 +-0.322+-0.0045 H     16     88.2               V     17     165.5 \
        \             H     18     183.1+-7           H     19     183.1+-4.5    \
        \     H    (FNMOC used this chan for 183 GHz image)     20     183.1+-3.0\
        \         H     21     183.1+-1.8         H     22     183.1+-1.0        \
        \ H     BeamTime[12,96]:  microsecond, i.e., 1*10^-6.  IET \"IDPS Epoch Time\"\
        \ is used                       It is a signed 64-bit integer giving microseconds\
        \ since                       00:00:00.000000 Jan 1 1958.\n    BrightnessTemperatureFactors[2]:\
        \ 1: scale (unitless); 2: offset (K)     BrightnessTemperature[12,96,22]:\
        \ [scan,pix,chans]     SDR geolocation Info     Latitude/Longitude[12,96]:\
        \   for Chan 17 only (for initial product,                               \
        \                     it is used for all channels)     BeamLatitude[12,96,5]:\
        \       for chan 1,2,3,16,17. They will be used for                      \
        \                       associated TBs at a later date.\n    BeamLongitude[12,96,5]:\
        \      for chan 1,2,3,16,17     SatelliteAzimuthAngle, SatelliteZenithAngle,\
        \     SolarAzimuthAngle, SolarZenithAngle[12,96] Notes ----- Unix epoch time\
        \ is defined as the number of seconds that have elapsed since January 1, 1970\
        \ (midnight UTC/GMT). Thus, there is a 12 years difference for the JPSS data\
        \ when datetime.datetime.utcfromtimestamp(epoch) is used to convert the JPSS\
        \ IDPS Epoch time to the humman-readable date.\nThis reader is developed to\
        \ read one granual a time from ATMS npp and jpss-1(n20) data files.\nThe example\
        \ files are: * ``SATMS_j01_d20210809_t0959306_e1000023_b19296_fnmoc_ops.h5``:\
        \ for TBs.  'b': orbit# * ``GATMO_j01_d20210809_t0959306_e1000023_b19296_fnmoc_ops.h5``:\
        \ for geolocations"
      family: standard
      interface: readers
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/readers/atms_hdf5.py
      signature: (fnames, metadata_only=False, chans=None, area_def=None, self_register=False)
      source_names:
      - atms
    aws_netcdf:
      docstring: 'Arctic Weather Satellite (aws) MWR Level 1B NetCDF reader.

        Channel information is from the ESA webpage: https://www.esa.int/Applications/Observing_the_Earth/Meteorological_missions/
        Arctic_Weather_Satellite/The_instrument All channels have a same array size
        (nscan,nfov).

        Chan        Freq(GHz)        FOV(km)        Utilisation Band 1: 1           50.3             <=
        40          Temp sounding 2           52.8             <= 40          Temp
        sounding 3           53.246           <= 40          Temp sounding 4           53.956           <=
        40          Temp sounding 5           54.4             <= 40          Temp
        sounding 6           54.94            <= 40          Temp sounding 7           55.5             <=
        40          Temp sounding 8           57.290           <= 40          Temp
        sounding Band 2: 9           89               <= 20          Window and cloud
        detection Band 3: 10          165.5            <= 10          Window and humidity
        sounding 11          176.31           <= 10          Humidity sounding 12          178.81           <=
        10          Humidity sounding 13          180.31           <= 10          Humidity
        sounding 14          181.51           <= 10          Humidity sounding 15          182.31           <=
        10          Humidity sounding Band 4: 16          325.15 +- 1.2    <= 10          Humidity
        sounding/cloud detection 17          325.15 +- 2.4    <= 10          Humidity
        sounding/cloud detection 18          325.15 +- 4.1    <= 10          Humidity
        sounding/cloud detection 19          325.15 +- 6.6    <= 10          Humidity
        sounding/cloud detection Note:  We do not know actual assignments of channels
        to the four groups, due to lack of official documentation on Arctic Weather
        Satellite data. Thus, we select current channels for each band based on internal
        discussions and our experience.

        We will make adjustments once there are any differences from official document
        is available.

        Also, variables (L1B_quality_flag and degraded_channels) are space holders
        for QC purposes. They are not used for now, but will be applied later.'
      family: standard
      interface: readers
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/readers/aws_netcdf.py
      signature: (fnames, metadata_only=False, chans=None, area_def=None, self_register=False)
      source_names:
      - Unspecified
