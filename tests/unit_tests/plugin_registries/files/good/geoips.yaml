    windsat_idr37_binary:
      docstring: "Windsat binary data reader.\nThis code is designed to read windsat\
        \ sdr binary data (idr37) file for windsat 37 GHz products in GEOIPS environments.\
        \ the input file name is something alike US058SORB-BINspp.wndmi_fws_d20191126_s134102_e153244_r87467_cfnmoc.idr37.\n\
        V1.0: initial version.  Song Yang, NRL-MRY, 01/08/2020 errflag is the important\
        \ parameter of the windsat edr dataset.  It is a 32-bit integer which describes\
        \ what is the current data point status.  Here are the meaning of each bit::\
        \     0-7: Wilheit rain flag       8: forward/aft scan (bit set to 1 for forward\
        \ part of scan, 0 for aft scan )       9: ascending/descending pass flag (1\
        \ for ascending, 0 for descending)      10: Warm load flag      11: Warm load\
        \ gains applied (1 = gains applied, 0 = gains not applied)      12: Glare\
        \ angle invalid because no 1 vector or LOS doesn't pierce earth      13-18:\
        \ Glare angle (0 to 30 represents angles of 0 to 60 degree in increments \
        \            of 2 deg; 31 represents angles .gt. 60 deg; 32 represents invalid\
        \             glare angle)      19: Cold load flag. If set to 1 the VH channel\
        \ data had to be corrected due          to interference in the cold load signal,\
        \ such as the moon or a          geostationary satellite.\n     20: Gain Saturation\
        \ flag. Set to 1 when strong RFI causes the gain to change.\n         This\
        \ is set if any TDR saturation flag is set at this frequency      23: used\
        \ to hold the rfi flag so that it may be passed on to other structures   \
        \       such as the resampling and intermediate structures. Finally RFI is\
        \ placed          in the sdr structure.\n     other bits are spare Here is\
        \ the original sdr record in Fortran::     type IDRRecord_short        real(double)\
        \ :: JD2000           8 bytes        real, dimension(4)::  stokes     16 bytes\
        \        real :: latitude                 4 bytes        real :: longitude\
        \                4 bytes        real :: EIA                      4 bytes:\
        \ earth incidence angle, the angle                                       \
        \           on the ground between vertical and                           \
        \                       the satellite look vector        real :: PRA     \
        \                 4 bytes: rotation of the polarization plane            \
        \                                      from true        real :: CAA      \
        \                4 bytes: compass azimuth angle on the ground        real\
        \ :: tI45, tIcp, pra45        12 bytes        integer :: errflag         \
        \      4 bytes (32-bits integer):a set of bit                            \
        \                     flags for data quality and                         \
        \                        conditions (above explanation)        integer ::\
        \ Scan                  4 bytes: scan line number in the orbit.\n        \
        \                                         WindSat scans every 1.9 seconds\
        \        integer(int16) :: dcnum          2 bytes: pixel number along the\
        \ scan,                                                  called 'downcount\
        \ number',                                                  because the highest\
        \ pixel number                                                  is measured\
        \ first.\n       integer(int16) :: SurfaceType    2 bytes: legacy SSMI surface\
        \ type        integer(int16) :: scanAngle      2 bytes: angle on the ground\
        \ between the                                                  flight direction\
        \ and the look                                                  direction\
        \        integer(int8) :: water2land ! copied from IDRL record   1 byte: \
        \       integer(int8) :: land2water ! copied from IDRL record   1 byte:  \
        \   end type IDRRecord_short * Gain saturation is when a sudden, large signal\
        \ causes the gain to change   quickly and make averaged gain unreliable.\n\
        * Forward/Aft is for sensor view position * The warm load flag indicates that\
        \ calibration may be unreliable due to solar   intrusion into the warm load.\n\
        * Cold load flags do not mean calibration is unreliable. It's a way for us\
        \ to   check the cold load correction algorithm.\n* Sun glare is not something\
        \ to worry about.\n* The RFI flag is never set at 37 GHz.\n* tI45, tIcp, pra45,\
        \ scanAngleI, water2land, and land2water aren't commanly used.\n   * The first\
        \ four are for recreating the 6-element pre-Stokes polarization      vector,\
        \ and the last two measure coastal contamination The actual idr37 data record\
        \ (idr_record) in C::     typedef struct {        double jd2000;        float\
        \ stokes[4];        float plat;     lat of earth observation        float\
        \ plon;     lon of earth observation        float eia;      radiance= ~53deg\
        \        float pra;        float caa;        float slat;  latitude of satellite\
        \ position?  not        float slon;  longitude of satellite position? not\
        \        float salt;  altitude of satellite (meter? km?) not        int errflag;\
        \        int scan;        short dcnum;        short surf;        float spare;\
        \     idr_record;     Its total length of idr_record is 72 bytes"
      family: standard
      interface: readers
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/readers/windsat_idr37_binary.py
      signature: (fnames, metadata_only=False, chans=None, area_def=None, self_register=False)
      source_names:
      - windsat
