    amsua_mhs_mirs:
      docstring: "Read AMSU-A and MHS MIRS NetCDF data files.\nThis reader is desgined\
        \ for importing the Advanced Microwave Sounding Unit (AMSU)-A and Microwave\
        \ Humidity Sounder (HMS) files made available from NOAA MIRS.\nThese data\
        \ files have a different file name convention and and data structure from\
        \ previous MSPPS.  Example of MIRIS files: * NPR-MIRS-IMG_v11r4_ma1_s202101111916000_e202101112012000_c202101112047200.nc\
        \     * (ma1 is for metop-B) * NPR-MIRS-IMG_v11r4_ma2_s202101111715000_e202101111857000_c202101111941370.nc\
        \     * (ma2 is for metop-A) * NPR-MIRS-IMG_v11r4_n19_s202101111730000_e202101111916000_c202101112001590.nc\
        \     * (NOAA-19) AMSU-B was replaced with MHS in 2005, and now AMSU-A / MHS\
        \ fly on newer NOAA birds (>17) and METOP-A/B/C (METOP-A dead now).  AMSU-A\
        \ channels are still channels 1-15, and MHS channels (1-5) live in the same\
        \ 16-20 slots that previously contained AMSU-B.\nMore information on the AMSU\
        \ and MHS instruments may be found here https://en.wikipedia.org/wiki/Advanced_microwave_sounding_unit\
