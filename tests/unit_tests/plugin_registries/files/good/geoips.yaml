    amsub_hdf:
      docstring: "Read AMSU-B and MHS passive microwave data files.\nThis reader is\
        \ desgined for importing NOAA Advanced Microwave Sounding Unit (AMSU)-B/Microwave\
        \ Humidity Sounder (HMS) and EUMETSAQT MHS data files in hdf format, such\
        \ as * NPR.MHOP.NP.D20153.S2046.E2230.B5832021.NS (N19), * NPR.MHOP.NN.D20153.S1927.E2105.B7748081.NS\
        \ (N18), * NPR.MHOP.M1.D20153.S2229.E2318.B3998282.NS (METOP).\n V1.0:  Initial\
        \ version, NRL-MRY, June 1, 2020 Basic information on AMSU-B product file::\
        \     Input SD Variables     (nscan, npix):         npix=90 pixels per scan;\
        \         nscan: vary with orbit     chan-1 AT:  89 GHz as ch16 anttenna temperature\
        \ at V-pol   FOV 16km at nadir     chan-2 AT:  150 (157) GHz as ch17 the number\
        \ in bracket is for MHS from                                       metops\
        \ at V-pol, 16km at nadir     chan-3 AT:  183.31 +-1 GHz as ch18    at H-pol,\
        \ 16km     chan-4 AT:  183.31 +-3 GHz as ch19    at H-pol, 16km     chan-5\
        \ AT:  183.31 +-7 (190.3) GHz as ch20    at V-pol, 16km     lat:     -90,\
        \ 90     deg     lon:     -180, 180   deg     RR:  surface rainrate (mm/hr)\
        \     Snow: surafce snow cover     IWP:  ice water path (unit?)     SWE: \
        \ snow water equvelent  (unit)     Sfc_type:  surface type     Orbit_mode:\
        \   -1: ascending, 1: decending, 2: both     SFR:  snowfall rate (unit?) \
        \    LZ_angle:  local zinath angle (deg)     SZ_angle:  solar zinath angle\
        \ (deg)     Vdata info (definition of AMSU-B date):     ScanTime_year    \
        \ ScanTime_month     ScanTime_day     ScanTime_hour     ScanTime_minute  \
        \   ScanTime_second     ScanTime_Jday     Time"
      family: standard
      interface: readers
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/readers/amsub_hdf.py
      signature: (fnames, metadata_only=False, chans=None, area_def=None, self_register=False)
      source_names:
      - amsu-b
