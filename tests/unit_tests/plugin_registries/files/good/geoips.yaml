        of reader is indepent from the GEOIPS system whose environmental parametrs
        must be used in V1.  Now, only python functipns are used with geoips framework
        and xarray is utilized to process datasets for product applications.

        Version Histopry:      V1: initial code, July 24, 2020, NRL-MRY Input File      SSMIS
        SDR data Output Fields      XARRAY onjectives to hold variables'
      family: standard
      interface: readers
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/readers/ssmis_binary.py
      signature: (fnames, metadata_only=False, chans=None, area_def=None, self_register=False)
      source_names:
      - ssmis
