        \           WindSp(Scanline, Field_of_view): Wind Speed (m/s) (scale_factor\
        \ = 0.01           WindDir(Scanline, Field_of_view: Wind Direction (scale_factor\
        \ = 0.01)           WindU(Scanline, Field_of_view):U-direction Wind Speed\
        \ (m/s)                                         (scale_factor = 0.01)    \
        \       WindV(Scanline, Field_of_view: V-direction Wind Speed (m/s)      \
        \                                   (scale_factor = 0.01)           Prob_SF(Scanline,\
        \ Field_of_view): Probability of falling snow (%) Additional info::     Variables\
