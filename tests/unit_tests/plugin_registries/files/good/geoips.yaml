        \  ScanTime_UTC(Scanline): Number of seconds since 00:00:00 UTC          \
        \ Orb_mode(Scanline): 0-ascending,1-descending           Latitude(Scanline,\
        \ Field_of_view):Latitude of the view (-90,90),                          \
