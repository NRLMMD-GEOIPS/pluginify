    ewsg_netcdf:
      docstring: "Read EWS-G data.\nThis EWS-G(Electro-Optical Infrared Weather System\
        \ - Geostationary) reader is designed for reading theEWS-G data files (EWS-G\
        \ is renamed from GOES-13).\nThe reader is only using the python functions\
        \ and xarray variables.\nThe reader is based on EWS-G data in netcdf4 format.\n\
        \ V1.0:  NRL-Monterey, 02/25/2021 EWS-G file information::     Example of\
        \ the gvar filename:   2020.1212.0012.goes-13.gvar.nc     Note that channel-3\
        \ is not available for EWS-G.\n      gvar_Ch3(TIR=5.8-7.3um, ctr=6.48um,4km):\
        \ unit=temp-deg(C), scale_factor=0.01     variables:       gvar_Ch1(VIS=0.55-0.75um,\
        \ ctr=0.65um,1km): unit=albedo*100,  scale_factor=0.01       gvar_Ch2(MWIR=3.8-4.0um,\
        \  ctr=3.9um, 4km): unit=temp-deg(C), scale_factor=0.01       gvar_Ch4(TIR=10.2-11.2um,\
        \ ctr=10.7um,4km): unit=temp-deg(C), scale_factor=0.01       gvar_Ch6(TIR=12.9-13.7um,\
        \ ctr=13.3um 4km): unit=temp-deg(C), scale_factor=0.01       latitude: unit=degree\
        \       longitude:unit=degree       sat_zenith: unit=degree       sun_zenith:\
        \ unit=degree       rel_azimuth:unit=degree       variable array definition:\
        \  var(scan,pix); scan-->lines, pix-->samples     attributes: many"
      family: standard
