        \  150 (157) GHz       as ch17 the number in bracket is for MHS          \
        \                                  from metops at V-pol, 16km at nadir   \
        \  chan-3 AT:  183.31 +-1 GHz          as ch18    at H-pol, 16km     chan-4\
        \ AT:  183.31 +-3 GHz          as ch19    at H-pol, 16km     chan-5 AT:  183.31\
        \ +-7 (190.3) GHz  as ch20    at V-pol, 16km     lat:     -90, 90     deg\
        \     lon:     -180, 180   deg     RR:  surface rainrate (mm/hr)     Snow:\
        \ surafce snow cover     IWP:  ice water path     SWE:  snow water equvelent\
        \     Sfc_type:  surface type     Orbit_mode:   -1: ascending, 1: decending,\
        \ 2: both     SFR:  snowfall rate (unit?)     LZ_angle:  local zinath angle\
        \ (deg)     SZ_angle:  solar zinath angle (deg)"
