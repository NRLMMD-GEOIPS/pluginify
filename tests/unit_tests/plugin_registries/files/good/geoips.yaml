class_based:
  algorithms:
    Convective_Storms:
      docstring: 'Data manipulation steps for "Convective_Storms" EUMETSAT RGB product.

        This algorithm expects five Infrared/Visible channels for an RGB image: *
        Red SEVIRI B05BT - B06BT * Green SEVIRI B04BT - B09BT * Blue SEVIRI B03Ref
        - B01Ref'
      family: xarray_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Convective_Storms.py
      signature: (xobj)
    Day_Microphys_Summer:
      docstring: 'Data manipulation steps for "Day_Microphys_Summer" EUMETSAT RGB
        product.

        This algorithm expects three Infrared/Visible channels for an RGB image: *
        Red SEVIRI B02Ref * Green SEVIRI B04BT * Blue SEVIRI B09BT'
      family: xarray_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Day_Microphys_Summer.py
      signature: (xobj)
    Day_Microphys_Winter:
      docstring: 'Data manipulation steps for "Day_Microphys_Winter" EUMETSAT RGB
        product.

        This algorithm expects three Infrared/Visible channels for an RGB image: *
        Red SEVIRI B02Ref * Green SEVIRI B04BT * Blue SEVIRI B09BT'
      family: xarray_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Day_Microphys_Winter.py
      signature: (xobj)
    Day_Solar:
      docstring: 'Data manipulation steps for "Day_Solar" EUMETSAT RGB product.

        This algorithm expects three Infrared/Visible channels for an RGB image: *
        Red SEVIRI B02Ref * Green SEVIRI B03Ref * Blue SEVIRI B04BT'
      family: xarray_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Day_Solar.py
      signature: (xobj)
    Dust_RGB:
      docstring: 'Data manipulation steps for "Dust" EUMETSAT RGB product.

        This algorithm expects three visible reflectances for an RGB image: * Red
        SEVIRI B10BT - B09BT * Green SEVIRI B09BT - B07BT * Blue SEVIRI B09BT'
      family: xarray_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Dust_RGB.py
      signature: (xobj)
    Natural_Color:
      docstring: 'Data manipulation steps for "Natural Color" EUMETSAT RGB product.

        This algorithm expects three visible reflectances for an RGB image: * 0.6
        um * 0.8 um * 1.6 um'
      family: xarray_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Natural_Color.py
      signature: (xobj)
    Night_Microphys:
      docstring: 'Data manipulation steps for "Night_Microphy" EUMETSAT RGB product.

        This algorithm expects three Infrared/Visible channels for an RGB image: *
        Red SEVIRI B10BT - B09BT * Green SEVIRI B09Bt - B04BT * Blue SEVIRI B09BT'
      family: xarray_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Night_Microphys.py
      signature: (xobj)
    Night_Vis:
      docstring: 'Data manipulation steps for "Night_Vis" product, standard Version.

        This algorithm expects one VIIRS channel (DNBRad) for a single channel image.'
      family: list_numpy_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Night_Vis.py
      signature: (arrays, output_data_range=None, scale_factor=None, gamma_list=None,
        input_units=None, output_units=None, min_outbounds=None, max_outbounds=None,
        max_night_zen=None, norm=None, inverse=None)
    Night_Vis_GeoIPS1:
      docstring: 'Data manipulation steps for "Night_Vis" product, GeoIPS 1 Version.

        This algorithm expects one VIIRS channel (DNBRad) for a single channel image.'
      family: list_numpy_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Night_Vis_GeoIPS1.py
      signature: (arrays, min_outbounds='crop', max_outbounds='crop', max_night_zen=90)
    Night_Vis_IR:
      docstring: 'Data manipulation steps for "Night_Vis_IR" product.

        This algorithm expects two VIIRS channels (DNBRad and M16BT) for a RGB image'
      family: list_numpy_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Night_Vis_IR.py
      signature: (arrays)
    Night_Vis_IR_GeoIPS1:
      docstring: 'Data manipulation steps for "Night_Vis_IR" product, GeoIPS 1 Version.

        This algorithm expects two VIIRS channels (DNBRad and M16BT) for a RGB image'
      family: list_numpy_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Night_Vis_IR_GeoIPS1.py
      signature: (arrays, max_night_zen=90)
    RGB_Default:
      docstring: 'Data manipulation steps for "Night_Vis_IR" product.

        This algorithm expects two VIIRS channels (DNBRad and M16BT) for a RGB image'
      family: list_numpy_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/RGB_Default.py
      signature: (arrays, sun_zen_correction=False, output_data_range=None, min_outbounds='crop',
        max_outbounds='crop', norm=True, inverse=False)
    Volcanic_Ash:
      docstring: 'Data manipulation steps for "Volcanic-Ash" EUMETSAT RGB product.

        This algorithm expects three Infrared/Visible channels for an RGB image: *
        Red SEVIRI B10BT - B09BT * Green SEVIRI B09BT - B07BT * Blue SEVIRI B09BT'
      family: xarray_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/Volcanic_Ash.py
      signature: (xobj)
    absdiff_mst:
      docstring: 'Data manipulation steps for standard absolute difference algorithm.

        Generalized algorithm to calculate the difference between 1 or 2 variables
        taken from multiple scan times over the same sector.'
      family: xarray_to_xarray
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/absdiff_mst.py
      signature: (xobj, variables, product_name, output_data_range=None, input_units=None,
        output_units=None, min_outbounds='crop', max_outbounds='crop', norm=False,
        inverse=False, sun_zen_correction=False, mask_night=False, max_day_zen=None,
        mask_day=False, min_night_zen=None, gamma_list=None, scale_factor=None)
    airmass:
      docstring: 'Data manipulation steps for "airmass" EUMETSAT RGB product.

        This algorithm expects four Infrared channels for an RGB image: * Red SEVIRI
        B05BT - B06BT * Green SEVIRI B08BT - B09BT * Blue SEVIRI B05BT'
      family: xarray_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/airmass.py
      signature: (xobj)
    high_near_constant_contrast:
      docstring: 'Data algorithm for High Near constant contrast imagery product.

        Algorithm is based upon work by Zinke (2017) for improved NCC VIIRS DNB imagery.'
      family: list_numpy_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/visir/HNear_Constant_Contrast.py
      signature: (arrays)
    model_channel:
      docstring: 'Data manipulation steps for model products.

        This algorithm expects one model variable/channel for a single channel image.'
      family: xarray_to_xarray
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/model/model_channel.py
      signature: (xobj, variables, product_name, output_data_range=None, pressure_level_range=1000,
        pressure_key=None, time_key='time', time_fcst=-1, min_outbounds='crop', max_outbounds='crop',
        norm=False, inverse=False, time_dim=None, grid_geo=False)
    model_windbarbs:
      docstring: Data manipulation steps for model windbarbs.
      family: xarray_to_numpy
      interface: algorithms
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/algorithms/model/model_windbarbs.py
