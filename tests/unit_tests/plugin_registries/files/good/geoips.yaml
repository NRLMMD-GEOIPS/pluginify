        \ RR(Scanline, Field_of_view): Rain Rate (mm/hr)           Snow(Scanline,\
        \ Field_of_view): Snow Cover (range: 0-1) i.e., 1 -> 100%           SWE(Scanline,\
        \ Field_of_view): Snow Water Equivalent (cm)           SnowGS(Scanline, Field_of_view):Snow\
        \ Grain Size (mm)           SIce(Scanline, Field_of_view):Sea Ice Concentration\
