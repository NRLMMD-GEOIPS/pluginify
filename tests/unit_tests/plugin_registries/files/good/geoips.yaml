    viirs_netcdf:
      docstring: 'VIIRS NetCDF reader.

        This VIIRS reader is designed for reading the NPP/JPSS VIIRS files geoips.

        The reader is only using the python functions and xarray variables.  Although
        the file name indicates the data is in netcdf4 format.

        Thus, the reader is based on the netcdf4 data format.

        The orginal reader (viirs_aotcimss_ncdf4_reader.py) was developed for geoips1,
        which applied many geoips1 function.

        V1.0:  NRL-Monterey, 09/17/2020 VIIRS file infOrmation::     There are 6 files
        for each time of VIIRS data, i.e.,     For NASA NPP VIIRS     20200826.074800.npp.viirs.viirs_npp_nasaearthdata_x.x.VNP02DNB.sdr.x.x.nc     20200826.074800.npp.viirs.viirs_npp_nasaearthdata_x.x.VNP02IMG.sdr.x.x.nc     20200826.074800.npp.viirs.viirs_npp_nasaearthdata_x.x.VNP02MOD.sdr.x.x.nc     20200826.074800.npp.viirs.viirs_npp_nasaearthdata_x.x.VNP03DNB.sdr.x.x.nc     20200826.074800.npp.viirs.viirs_npp_nasaearthdata_x.x.VNP03IMG.sdr.x.x.nc     20200826.074800.npp.viirs.viirs_npp_nasaearthdata_x.x.VNP03MOD.sdr.x.x.nc     For
        JPSS VIIRS     20200914.150000.npp.viirs.viirs_sips_jpss_uwssec_001.x.VJ102DNB.sdr.x.x.nc     20200914.150000.npp.viirs.viirs_sips_jpss_uwssec_001.x.VJ102IMG.sdr.x.x.nc     20200914.150000.npp.viirs.viirs_sips_jpss_uwssec_001.x.VJ102MOD.sdr.x.x.nc     20200914.150000.npp.viirs.viirs_sips_jpss_uwssec_001.x.VJ103DNB.sdr.x.x.nc     20200914.150000.npp.viirs.viirs_sips_jpss_uwssec_001.x.VJ103IMG.sdr.x.x.nc     20200914.150000.npp.viirs.viirs_sips_jpss_uwssec_001.x.VJ103MOD.sdr.x.x.nc     DNB:
        VIIRS day-night Band obs     MOD: VIIRS M-Band  obs     IMG: VIIRS I-Band  obs
        The *.VNP02* files are for the data records, while the *.VNP03* files are
        for the geolocation data records.

        The xarray of geoips reader need both the data and lat/lon info. Thus, this
        VIIRS reader is designed to read in the paired VNP02 and VNP03 files, depending
        on any one of DNB or IMG or MOD file.  In order to minimize dupilcated excution
        of VIIRS files, additional adjust of excution of the VIIRS files will be needed
        (discussion with Mindy on how to do it).'
      family: standard
      interface: readers
      is_derived_from_module: true
      package: geoips
      plugin_type: class_based
      relpath: plugins/modules/readers/viirs_netcdf.py
      signature: (fnames, metadata_only=False, chans=None, area_def=None, self_register=False,
        resample=False)
      source_names:
      - viirs
