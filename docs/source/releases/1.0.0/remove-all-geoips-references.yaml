enhancement:
- title: 'Pluginify Release Updates'
  description: |
    Final updates to this package in order to get a stable release up on PyPi. Updates
    include restructuring of the documentation, adding support for sphinxcontrib-typer
    for CLI documentation, refactored the CLI to use the 'typer' package instead of
    argparse, complete removal of any reference to GeoIPS, and implemented new
    interfaces and dummy plugins of those interfaces in order to run the unit tests
    without GeoIPS.
