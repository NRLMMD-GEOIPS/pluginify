refactor:
- title: 'Replace any reference of GeoIPS with pluginify code'
  description: |
    This PR refactors all copied code from GeoIPS to make use of pluginify without any
    reference to GeoIPS. This way, this package can be used without having to install
    the large dependency that is GeoIPS. Due to the fact that this PR removed all
    validation code from pluginify, independent validation routines will need to be
    set up by packages that hope to use this library for their own plugin
    infrastructure.
