refactor:
- title: 'Replace any reference of GeoIPS with pluginify code'
  description: |
    This PR refactors all copied code from GeoIPS to make use of pluginify without any
    reference to GeoIPS. This way, this package can be used without having to install
    the large dependency that is GeoIPS. Due to the fact that this PR removed all
    validation code from pluginify, independent validation routines will need to be
    set up by packages that hope to use this library for their own plugin
    infrastructure.
  files:
    deleted:
      - docs/source/getting-started/template_instructions.rst
      - docs/source/my_package_api/index.rst
    added:
      - docs/source/architecture.rst
      - docs/source/command_line.rst
      - docs/source/functionality.rst
      - docs/source/index.rst
      - pluginify/commandline.py
    modified:
      - .gitignore
      - README.md
      - pluginify/create_plugin_registries.py
      - pluginify/interfaces/base.py
      - pluginify/plugin_registry.py
      - pyproject.toml
      - tests/unit_tests/plugin_registries/files/good/geoips.yaml
      - tests/unit_tests/plugin_registries/test_plugin_registries.py
  related-issue:
    number: null
    repo_url: ''
  date:
    start: null
    finish: null
