  - title: "Add initial plugin registry functionality"
    description: |
      Core plugin registry infrastructure including:

      * PluginRegistry class for registering, retrieving and creating
        plugin objects from YAML and Python class plugins.
      * Plugin registry creation script that discovers all plugins in
        installed packages under a given namespace.
      * Base interface classes for YAML-based and class-based plugin
        interfaces.
      * Error handling classes (PluginError, PluginRegistryError).
      * Utility functions for nested dictionary merging and context
        managers.
    files:
      added:
        - "pluginify/create_plugin_registries.py"
        - "pluginify/errors.py"
        - "pluginify/interfaces/base.py"
        - "pluginify/plugin_registry.py"
        - "pluginify/utils/__init__.py"
        - "pluginify/utils/context_managers.py"
        - "tests/unit_tests/plugin_registries/test_plugin_registries.py"
    related-issue:
      number: 0
      repo_url: "https://github.com/NRLMMD-GEOIPS/geoips"
